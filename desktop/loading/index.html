<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Live Transcription</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: #0f0f10; color: #888;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .box { text-align: center; }
  .wave { display: flex; gap: 7px; justify-content: center; height: 56px; align-items: center; margin-bottom: 22px; }
  .wave span {
    width: 9px; border-radius: 5px;
    background: #685EBD;
    animation: pulse 1.1s ease-in-out infinite;
  }
  .wave span:nth-child(1) { height: 18px; animation-delay: 0s; }
  .wave span:nth-child(2) { height: 32px; animation-delay: 0.15s; }
  .wave span:nth-child(3) { height: 48px; animation-delay: 0.3s; }
  .wave span:nth-child(4) { height: 32px; animation-delay: 0.45s; }
  .wave span:nth-child(5) { height: 18px; animation-delay: 0.6s; }
  @keyframes pulse {
    0%, 100% { transform: scaleY(0.55); opacity: 0.55; }
    50% { transform: scaleY(1); opacity: 1; }
  }
  #msg { font-size: 14px; }
  #err { font-size: 12px; color: #a66; margin-top: 10px; display: none; max-width: 380px; line-height: 1.5; }
</style>
</head>
<body>
<div class="box">
  <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
  <div id="msg">Starting Live Transcription...</div>
  <div id="err">Still starting... if this never finishes, check the console
  window for errors. They are also written to
  %APPDATA%\LiveTranscription\logs.</div>
</div>
<script>
  const APP = 'http://localhost:3011';
  const t0 = Date.now();
  async function probe() {
    try {
      
      await fetch(APP + '/engines', { mode: 'no-cors', cache: 'no-store' });
      location.replace(APP);
    } catch {
      if (Date.now() - t0 > 40000) document.getElementById('err').style.display = 'block';
      setTimeout(probe, 350);
    }
  }
  probe();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Japanese Transcription</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>Live Japanese Transcription</h1>
  <span id="status-text">Stopped</span>
</header>

<div class="controls">
  <button id="btn-start">Start</button>
  <button id="btn-stop" disabled>Stop</button>
  <button id="btn-clear">Clear</button>
  <div class="source-toggle">
    <button id="src-mic" class="active">Mic</button>
    <button id="src-loopback">Speaker</button>
  </div>
  <select id="device-select" style="background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#ccc;font-size:13px;padding:5px 10px;">
    <option value="">Loading devices...</option>
  </select>
  <select id="lang-select" style="background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#ccc;font-size:13px;padding:5px 10px;">
    <option value="ja" selected>Japanese</option>
    <option value="en">English</option>
    <option value="zh">Chinese</option>
    <option value="ko">Korean</option>
    <option value="fr">French</option>
    <option value="es">Spanish</option>
    <option value="pt">Portuguese</option>
    <option value="de">German</option>
    <option value="ru">Russian</option>
    <option value="ar">Arabic</option>
    <option value="ms">Malay</option>
    <option value="auto">Auto</option>
  </select>
  <span style="font-size:13px;color:#666;">→</span>
  <select id="target-lang-select" style="background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#ccc;font-size:13px;padding:5px 10px;">
    <option value="en-US" selected>English</option>
    <option value="ja-JP">Japanese</option>
    <option value="zh-CN">Chinese (Simplified)</option>
    <option value="zh-TW">Chinese (Traditional)</option>
    <option value="ko-KR">Korean</option>
    <option value="fr-FR">French</option>
    <option value="es-ES">Spanish</option>
    <option value="pt-BR">Portuguese</option>
    <option value="ar-SA">Arabic</option>
    <option value="th-TH">Thai</option>
    <option value="tr-TR">Turkish</option>
  </select>
  <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#aaa;margin-left:8px;cursor:pointer;">
    <input type="checkbox" id="osc-toggle" style="cursor:pointer;"> VRChat OSC
  </label>
  <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#aaa;cursor:pointer;">
    <input type="checkbox" id="translate-toggle" style="cursor:pointer;"> Translate
  </label>
  <span id="mic-label"></span>
  <button id="btn-config" title="Translation settings">⚙</button>
</div>

<!-- Settings panel -->
<div id="config-panel">
  <div id="config-header">
    <span>Settings</span>
    <button id="config-close">✕</button>
  </div>
  <div id="config-body">
    <label class="config-label">System Prompt <span style="color:#555;font-size:11px;">({language} = target lang)</span></label>
    <textarea id="cfg-system-prompt" rows="5" placeholder="Loading..."></textarea>

    <label class="config-label" style="margin-top:12px;">Translation Backend</label>
    <select id="cfg-backend">
      <option value="google">Google (free)</option>
      <option value="deepl">DeepL</option>
      <option value="openai">OpenAI-compatible</option>
      <option value="openrouter">OpenRouter</option>
      <option value="lmstudio">LM Studio (local)</option>
      <option value="libretranslate">LibreTranslate (local)</option>
      <option value="ollama">Ollama (local)</option>
    </select>

    <div id="cfg-deepl-section" class="config-section">
      <label class="config-label">URL</label>
      <input id="cfg-deepl-url" type="text" />
      <label class="config-label" style="margin-top:10px;">Key</label>
      <input id="cfg-deepl-key" type="password" />
    </div>

    <div id="cfg-openai-section" class="config-section">
      <label class="config-label">URL</label>
      <input id="cfg-openai-url" type="text" />
      <label class="config-label" style="margin-top:10px;">Key</label>
      <input id="cfg-openai-key" type="password" />
      <label class="config-label" style="margin-top:10px;">Model</label>
      <input id="cfg-openai-model" type="text" />
      <label class="config-label" style="margin-top:10px;">Temperature</label>
      <input id="cfg-openai-temp" type="number" min="0" max="2" step="0.1" />
    </div>

    <div id="cfg-openrouter-section" class="config-section">
      <label class="config-label">Key</label>
      <input id="cfg-openrouter-key" type="password" />
      <label class="config-label" style="margin-top:10px;">Model</label>
      <input id="cfg-openrouter-model" type="text" />
      <label class="config-label" style="margin-top:10px;">Temperature</label>
      <input id="cfg-openrouter-temp" type="number" min="0" max="2" step="0.1" />
    </div>

    <div id="cfg-lmstudio-section" class="config-section">
      <label class="config-label">URL</label>
      <input id="cfg-lmstudio-url" type="text" />
      <label class="config-label" style="margin-top:10px;">Model</label>
      <input id="cfg-lmstudio-model" type="text" />
      <label class="config-label" style="margin-top:10px;">Temperature</label>
      <input id="cfg-lmstudio-temp" type="number" min="0" max="2" step="0.1" />
    </div>

    <div id="cfg-libretranslate-section" class="config-section">
      <label class="config-label">URL</label>
      <input id="cfg-libretranslate-url" type="text" />
      <label class="config-label" style="margin-top:10px;">Key</label>
      <input id="cfg-libretranslate-key" type="password" />
    </div>

    <div id="cfg-ollama-section" class="config-section">
      <label class="config-label">URL</label>
      <input id="cfg-ollama-url" type="text" />
      <label class="config-label" style="margin-top:10px;">Model</label>
      <input id="cfg-ollama-model" type="text" />
      <label class="config-label" style="margin-top:10px;">Temperature</label>
      <input id="cfg-ollama-temp" type="number" min="0" max="2" step="0.1" />
    </div>

    <button id="cfg-save">Save</button>
    <span id="cfg-status"></span>
  </div>
</div>
<div id="config-backdrop"></div>

<div id="transcript-container">
  <div id="main-zone">
    <div id="active-zone"></div>
    <div id="history-zone">
      <div id="empty-state">
        <div class="icon">🎙️</div>
        <p>Press Start to begin transcription</p>
      </div>
    </div>
  </div>
  <div id="raw-zone">
    <div id="raw-zone-header">Raw stream</div>
    <div id="raw-feed"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
